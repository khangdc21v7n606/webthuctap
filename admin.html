<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản trị - Phường Thới An Đông</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding-top: 50px; padding-bottom: 50px; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box;}
        h2, h3, h4 { text-align: center; color: #b30000; margin-top: 0; }
        label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background: #b30000; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        button:hover { background: #8a0000; }
        
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; padding: 6px 12px; font-size: 12px; width: auto; }
        .btn-danger:hover { background: #c82333; }
        
        .hidden { display: none; }
        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }
        
        /* Cấu trúc danh sách user */
        .user-list { list-style: none; padding: 0; margin: 0; max-height: 300px; overflow-y: auto; }
        .user-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px 15px; border-radius: 6px; margin-bottom: 10px; }
        .user-info strong { color: #333; font-size: 15px; }
        .user-info small { color: #666; display: block; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card" id="login-box">
        <h2>PORTAL QUẢN TRỊ VIÊN</h2>
        <p style="text-align:center; color:#666; font-size:14px; margin-bottom:25px;">Chỉ dành riêng cho Admin cấp cao</p>
        <label>Tài khoản Admin</label>
        <input type="text" id="au" placeholder="">
        <label>Mật khẩu</label>
        <input type="password" id="ap" placeholder="">
        <button onclick="adminLogin()">ĐĂNG NHẬP QUẢN TRỊ</button>
    </div>

    <div class="card hidden" id="main-box">
        <h3>CẤP TÀI KHOẢN CÁN BỘ</h3>
        <p style="text-align:center; font-size:13px; color:#666; margin-bottom: 20px;">Tạo user cho cán bộ đăng bài viết</p>
        
        <label>Tên đăng nhập mới</label>
        <input type="text" id="nu" placeholder="Ví dụ: tencanbo">
        <label>Email liên kết</label>
        <input type="email" id="ne" placeholder="Ví dụ: cb1@cantho.gov.vn">
        <label>Mật khẩu khởi tạo</label>
        <input type="password" id="np" placeholder="Nhập mật khẩu">
        <button class="btn-success" onclick="createUser()">TẠO TÀI KHOẢN</button>

        <hr>

        <h4>DANH SÁCH CÁN BỘ HIỆN TẠI</h4>
        <ul class="user-list" id="users-container">
            </ul>
        <div style="text-align:center; margin-top:20px;">
             <button onclick="adminLogout()" style="background:#6c757d; width:auto; padding: 8px 20px;">Đăng xuất</button>
        </div>
    </div>

    <script>
        // 1. Hàm xử lý đăng nhập Admin, mặc định tên và mật khẩu
        function adminLogin() {
            if(document.getElementById('au').value === 'khang' && document.getElementById('ap').value === 'khang123') {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('main-box').classList.remove('hidden');
                renderUsers(); // Tải danh sách user ngay khi đăng nhập thành công
            } else { alert("Sai thông tin quản trị viên!"); }
        }

        // 2. Hàm thêm User
        function createUser() {
            const username = document.getElementById('nu').value.trim();
            const email = document.getElementById('ne').value.trim();
            const password = document.getElementById('np').value.trim();
            
            if(!username || !password || !email) return alert("Vui lòng điền đầy đủ các trường!");

            let users = JSON.parse(localStorage.getItem('phuong_users')) || [];
            
            // Kiểm tra xem user đã tồn tại chưa
            const isExist = users.some(u => u.username === username);
            if (isExist) return alert("Tên đăng nhập này đã tồn tại! Vui lòng chọn tên khác.");

            users.push({username, email, password});
            localStorage.setItem('phuong_users', JSON.stringify(users));
            
            alert(`Đã cấp thành công tài khoản: ${username}`);
            
            // Xóa trắng form sau khi tạo
            document.getElementById('nu').value = '';
            document.getElementById('ne').value = '';
            document.getElementById('np').value = '';
            
            // Cập nhật lại danh sách bên dưới
            renderUsers();
        }

        // 3. Hàm Hiển thị danh sách User
        function renderUsers() {
            const users = JSON.parse(localStorage.getItem('phuong_users')) || [];
            const container = document.getElementById('users-container');
            
            let html = '';
            if (users.length === 0) {
                html = `<li style="text-align:center; color:#888; font-size:13px; padding:10px;">Chưa có tài khoản cán bộ nào được cấp.</li>`;
            } else {
                users.forEach((u, index) => {
                    html += `
                        <li class="user-item">
                            <div class="user-info">
                                <strong>👤 ${u.username}</strong>
                                <small>✉️ ${u.email}</small>
                            </div>
                            <button class="btn-danger" onclick="deleteUser(${index})">Xóa bỏ</button>
                        </li>
                    `;
                });
            }
            container.innerHTML = html;
        }

        // 4. Hàm Xóa User
        function deleteUser(index) {
            if (confirm("Đồng chí có chắc chắn muốn thu hồi (xóa) tài khoản này không?")) {
                let users = JSON.parse(localStorage.getItem('phuong_users')) || [];
                
                // Cắt bỏ 1 user tại vị trí index
                users.splice(index, 1);
                
                // Lưu lại mảng mới
                localStorage.setItem('phuong_users', JSON.stringify(users));
                
                // Vẽ lại giao diện
                renderUsers();
            }
        }

        // 5. Hàm Đăng xuất
        function adminLogout() {
            document.getElementById('au').value = '';
            document.getElementById('ap').value = '';
            document.getElementById('main-box').classList.add('hidden');
            document.getElementById('login-box').classList.remove('hidden');
        }
    </script>
</body>
</html>
